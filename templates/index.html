<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            transition: 0.4s;
        }

        body.dark {
            background: #121212;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 400px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            transition: 0.4s;
            animation: fadeIn 1s ease;
        }

        body.dark .container {
            background: #1e1e1e;
        }

        h1 {
            font-size: 22px;
        }

        .accuracy {
            font-size: 14px;
            color: gray;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            resize: none;
            margin-top: 10px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            animation: pop 0.5s ease;
        }

        .spam { color: red; }
        .notspam { color: lightgreen; }

        .confidence-bar {
            margin-top: 10px;
            width: 100%;
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 20px;
            color: white;
            text-align: center;
            line-height: 20px;
            font-size: 12px;
            transition: width 0.5s ease;
        }

        .toggle-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            padding: 8px 12px;
            background: black;
            color: white;
            border-radius: 20px;
            font-size: 12px;
        }

        /* Animations */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        @keyframes pop {
            from {transform: scale(0.8);}
            to {transform: scale(1);}
        }
    </style>
</head>

<body>

<!-- Dark mode toggle -->
<div class="toggle-btn" onclick="toggleMode()">🌙 Mode</div>

<div class="container">

    <h1>📧 Spam Detector</h1>
    <div class="accuracy">Accuracy: 98.55%</div>

    <form action="/predict" method="post">
        <textarea name="message" rows="5" placeholder="Enter your email here..."></textarea>
        <button type="submit">Check</button>
    </form>

    {% if prediction_text %}
        <div class="result 
            {% if 'Spam' in prediction_text %}spam{% else %}notspam{% endif %}">
            {{ prediction_text }}
        </div>

        <div>Confidence: {{ confidence }}</div>

        <div class="confidence-bar">
            <div class="confidence-fill"
                style="width: {{ confidence }};
                       background:{% if 'Spam' in prediction_text %}red{% else %}green{% endif %};">
                {{ confidence }}
            </div>
        </div>
    {% endif %}

</div>

<script>
    function toggleMode() {
        document.body.classList.toggle("dark");
    }
</script>

</body>
</html>
